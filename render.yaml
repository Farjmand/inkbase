projects:
  - name: inkbase
    environments:
      - name: production
        services:
          - type: web
            name: inkbase
            runtime: static
            repo: https://github.com/Farjmand/inkbase
            buildCommand: npm ci && npm run build
            staticPublishPath: ./dist
            branch: main
            autoDeploy: true
            routes:
              - type: rewrite
                source: /*
                destination: /index.html
            headers:
              - path: /assets/*
                name: Cache-Control
                value: public, max-age=31536000, immutable
              - path: /*
                name: Cache-Control
                value: no-cache
